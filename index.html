// ---- 選項式欄位(區域/房數/車位型式/數量):預設+自訂,自訂會記住 ----
const DEF_OPTS = {
  area:["北屯區","西屯區","南屯區","北區","西區","南區","東區","太平區","大里區","豐原區","潭子區","烏日區","大雅區"],
  rooms:["1房","2房","3房","4房","5房","6房"],
  ptype:["平面車位","機械車位"],
  pnum:["1","2","3","4","5"],
  status:[]   // 客戶分級/狀態:不給預設,選項全由使用者在下拉的「自訂…」自行新增(例:A級、要帶看、無效客)
};
let customOpts = loadOpts();
// 加入自訂選項時:若此值先前被刪除(還在隱藏名單),要一併解除隱藏,否則加了也不會出現在清單
function unhideOpt(key, v){
  const h = customOpts.hidden[key] || [];
  const nh = h.filter(x => String(x) !== String(v));
  if (nh.length === h.length) return false;
  customOpts.hidden[key] = nh; return true;
}
// 一次性修復:同一個值同時在「自訂」與「已刪除」名單 → 以自訂加入為準(解除隱藏)。
// 初始化階段不呼叫 saveOpts(此時 onLocalChange 尚未定義),僅寫回本機。
(function reconcileOpts(){
  let ch = false;
  ["area","rooms","ptype","pnum"].forEach(k => {
    const c = (customOpts[k] || []).map(String);
    const h = customOpts.hidden[k] || [];
    const nh = h.filter(x => !c.includes(String(x)));
    if (nh.length !== h.length){ customOpts.hidden[k] = nh; ch = true; }
  });
  if (ch){ try { localStorage.setItem("customer_app_opts_v1", JSON.stringify(customOpts)); } catch(e){} }
})();
function normOpts(o){ o = o || {}; const h = o.hidden || {}; return {area:o.area||[],rooms:o.rooms||[],ptype:o.ptype||[],pnum:o.pnum||[],status:o.status||[],hidden:{area:h.area||[],rooms:h.rooms||[],ptype:h.ptype||[],pnum:h.pnum||[],status:h.status||[]}}; }
function loadOpts(){ try { return normOpts(JSON.parse(localStorage.getItem("customer_app_opts_v1")||"{}")); } catch(e){ return normOpts(null); } }
function saveOpts(){ try { localStorage.setItem("customer_app_opts_v1", JSON.stringify(customOpts)); } catch(e){} if (typeof touchSettings === "function") touchSettings(); onLocalChange("settings"); }
// 選項自訂順序(每欄一份):拖曳調整後記住並同步;新選項自動接在後面。
function loadOptOrder(){ if (storageOK){ try { const s = JSON.parse(localStorage.getItem("customer_app_optorder_v1") || "null"); if (s && typeof s === "object") return s; } catch(e){} } return {}; }
let optOrder = loadOptOrder();
function saveOptOrder(){ if (storageOK){ try { localStorage.setItem("customer_app_optorder_v1", JSON.stringify(optOrder)); } catch(e){} } }
function optList(key){
  const hid = new Set((customOpts.hidden[key]||[]).map(String)); const seen = new Set();
  const present = DEF_OPTS[key].concat(customOpts[key]).map(String).filter(v => { if (!v || seen.has(v) || hid.has(v)) return false; seen.add(v); return true; });
  const ord = optOrder[key];
  if (ord && ord.length){
    const inOrd = ord.filter(v => present.includes(v));
    return inOrd.concat(present.filter(v => !inOrd.includes(v)));   // 自訂順序在前,未排序/新選項接後面
  }
  return present;
}
function makeOptSel(key, emptyLabel){
  const sel = document.getElementById(key+"Sel"), btn = document.getElementById(key+"Btn"),
        txt = document.getElementById(key+"Txt"), menu = document.getElementById(key+"Menu");
  let val = "";
  function renderMenu(){
    menu.innerHTML = `<button type="button" class="cselect-opt topt-empty${val===""?" sel":""}" data-v="">－</button>` +
      optList(key).map(v => `<button type="button" class="cselect-opt opt-line${v===val?" sel":""}" data-v="${esc(v)}"><span class="opt-drag" aria-label="拖曳排序"><svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><g stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><line x1="3.5" y1="5" x2="12.5" y2="5"/><line x1="3.5" y1="8" x2="12.5" y2="8"/><line x1="3.5" y1="11" x2="12.5" y2="11"/></g></svg></span><span class="opt-txt">${esc(v)}</span><span class="opt-del" data-del="${esc(v)}" title="刪除此選項" role="button">✕</span></button>`).join("") +
      `<div class="opt-add"><input placeholder="自訂…"><button type="button">加入</button></div>`;
  }
  function show(){ if (val){ txt.textContent = val; txt.classList.remove("ph"); } else { txt.textContent = emptyLabel; txt.classList.add("ph"); } }
  function set(v){ val = (v == null ? "" : String(v)).trim(); show(); }
  btn.addEventListener("click", e => { e.stopPropagation(); const was = sel.classList.contains("open");
    document.querySelectorAll(".opt-sel.open").forEach(x => x.classList.remove("open")); closeCatSel();
    if (!was){ menu.classList.remove("opt-editing"); renderMenu(); sel.classList.add("open"); } });
  menu.addEventListener("click", e => {
    const del = e.target.closest(".opt-del");
    if (del){ e.stopPropagation(); const dv = del.dataset.del;
      customOpts[key] = customOpts[key].filter(x => String(x) !== dv);              // 自訂清單移除
      if (DEF_OPTS[key].map(String).includes(dv)){                                   // 預設選項 → 加入隱藏名單
        customOpts.hidden[key] = customOpts.hidden[key] || [];
        if (!customOpts.hidden[key].map(String).includes(dv)) customOpts.hidden[key].push(dv);
      }
      saveOpts();
      if (val === dv) set(""); renderMenu(); return; }
    const add = e.target.closest(".opt-add");
    if (add){ e.stopPropagation();
      if (e.target.tagName === "BUTTON"){ const inp = add.querySelector("input"); const v = inp.value.trim();
        if (v){ let ch = unhideOpt(key, v);                                          // 先解除隱藏,否則加了也不會顯示
          if (!optList(key).includes(v)){ customOpts[key].push(v); ch = true; }
          if (ch) saveOpts();
          set(v); sel.classList.remove("open"); } }
      return; }
    const o = e.target.closest(".cselect-opt"); if (o){ if (menu.__lp){ menu.__lp = false; return; } set(o.dataset.v); sel.classList.remove("open"); }
  });
  menu.addEventListener("keydown", e => { if (e.target.matches(".opt-add input") && e.key === "Enter"){ e.preventDefault(); e.target.closest(".opt-add").querySelector("button").click(); } });
  // 長按選項才顯示該列 ✕(觸發後擋掉這次點擊,避免長按完誤選)
  let _lpTimer = null, _lpRow = null, _lpX = 0, _lpY = 0;
  const clearReveal = () => { menu.querySelectorAll(".opt-line.reveal").forEach(x => x.classList.remove("reveal")); };
  menu.addEventListener("pointerdown", e => {
    menu.__lp = false;
    if (e.target.closest(".opt-del") || e.target.closest(".opt-add") || e.target.closest(".opt-drag")) return;
    const row = e.target.closest(".opt-line"); if (!row) return;
    _lpRow = row; _lpX = e.clientX; _lpY = e.clientY; clearTimeout(_lpTimer);
    _lpTimer = setTimeout(() => { menu.__lp = true; _lpRow = null; menu.classList.add("opt-editing"); try { navigator.vibrate && navigator.vibrate(12); } catch(_){} }, 400);
  });
  menu.addEventListener("pointermove", e => { if (_lpRow && (Math.abs(e.clientX - _lpX) > 10 || Math.abs(e.clientY - _lpY) > 10)){ clearTimeout(_lpTimer); _lpRow = null; } });
  const endLp = () => { clearTimeout(_lpTimer); _lpRow = null; };
  menu.addEventListener("pointerup", endLp);
  menu.addEventListener("pointercancel", endLp);
  // touch 事件雙保險(部分裝置 pointer 被攔截)
  menu.addEventListener("touchstart", e => {
    menu.__lp = false;
    if (e.target.closest(".opt-del") || e.target.closest(".opt-add") || e.target.closest(".opt-drag")) return;
    const row = e.target.closest(".opt-line"); if (!row) return;
    const tc = e.touches[0]; _lpX = tc.clientX; _lpY = tc.clientY; _lpRow = row; clearTimeout(_lpTimer);
    _lpTimer = setTimeout(() => { menu.__lp = true; _lpRow = null; menu.classList.add("opt-editing"); try { navigator.vibrate && navigator.vibrate(12); } catch(_){} }, 380);
  }, {passive:true});
  menu.addEventListener("touchmove", e => { if (_lpRow){ const tc = e.touches[0]; if (Math.abs(tc.clientX - _lpX) > 12 || Math.abs(tc.clientY - _lpY) > 12){ clearTimeout(_lpTimer); _lpRow = null; } } }, {passive:true});
  menu.addEventListener("touchend", endLp, {passive:true});
  menu.addEventListener("touchcancel", endLp, {passive:true});
  // 選項拖曳排序(長按進排序模式後,握把可拖)
  (function(){
    let drag = null;
    menu.addEventListener("pointerdown", e => {
      const h = e.target.closest(".opt-drag"); if (!h) return;
      const row = h.closest(".opt-line"); if (!row) return;
      e.preventDefault(); e.stopPropagation();
      const rows = Array.from(menu.querySelectorAll(".opt-line"));
      const index = rows.indexOf(row);
      const rowH = rows.length > 1 ? (rows[1].getBoundingClientRect().top - rows[0].getBoundingClientRect().top) : row.offsetHeight + 1;
      drag = { row, index, target: index, startY: e.clientY, rowH, rows };
      row.classList.add("dragging"); document.body.style.userSelect = "none";
    });
    document.addEventListener("pointermove", e => {
      if (!drag) return;
      const dy = e.clientY - drag.startY;
      drag.row.style.transform = `translateY(${dy}px)`;
      let target = drag.index + Math.round(dy / drag.rowH);
      target = Math.max(0, Math.min(drag.rows.length - 1, target));

  const arr = [...cardsEl.querySelectorAll(".card[data-id]")];

    const fresh = [...cardsEl.querySelectorAll(".card[data-id]")];

let _tselSwallow = false;   // 長按成立後緊接的那一下 click 要吞掉,否則會把剛選起來的列又切掉
function _mkLpRing(host, ms, rx){
  const NS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(NS, "svg");
  svg.setAttribute("class", "lp-ring"); svg.setAttribute("aria-hidden", "true");
  svg.style.setProperty("--lp-ms", ms + "ms"); svg.style.setProperty("--lp-rx", rx + "px");
  ["lp-track", "lp-draw", "lp-tip"].forEach(c => {
    const r = document.createElementNS(NS, "rect");
    r.setAttribute("class", c); if (c !== "lp-track") r.setAttribute("pathLength", "100");
    svg.appendChild(r);
  });
  host.appendChild(svg); return svg;
}
function enterTselMode(seedId){

function _tdelLpCancel(){

// ---- 批次選取強化:長按啟動後「不放手直接上下拖」= 掃過的列連續選取 ----
// 範圍式:永遠選「長按起點 ~ 目前指到的列」這一段;拖過頭再拉回來,多掃到的會自動取消。
// 拖曳前就已勾選的列不受影響。指標拖到表格上/下邊緣會自動捲動(手機同樣適用)。
let tselDrag = null;
function _tselDragStart(seedTr){
  const rows = [...tableWrap.querySelectorAll(".tbody-wrap tr[data-id]")];
  let i = rows.indexOf(seedTr);
  // 列若在長按期間被重繪(例:前景同步套用合併結果),改用 id 對回新節點
  if (i < 0 && seedTr && seedTr.dataset) i = rows.findIndex(r => r.dataset.id === seedTr.dataset.id);
  if (i < 0) return;
  tselDrag = { rows, anchor: i, cur: i, added: new Set(), x: 0, y: 0, raf: null };
  document.body.classList.add("dragsel");   // 拖曳中:覆蓋層穿透(見 selbar CSS 註解)
}
function _tselRowSet(tr, on){ if (on !== selected.has(tr.dataset.id)) toggleTselRow(tr); }
function _tselDragPaint(){
  const d = tselDrag; if (!d) return;
  d.raf = null;
  if (!tselMode){ _tselDragEnd(); return; }
  if (d.rows.length && !tableWrap.contains(d.rows[0])){   // 拖曳中途列被重繪:以 id 對回新節點,續拖不斷線
    const fresh = [...tableWrap.querySelectorAll(".tbody-wrap tr[data-id]")];
    d.rows = d.rows.map(o => fresh.find(n => n.dataset.id === o.dataset.id)).filter(Boolean);
    if (!d.rows.length){ _tselDragEnd(); return; }
    d.anchor = Math.min(d.anchor, d.rows.length - 1);
    d.cur = Math.min(d.cur, d.rows.length - 1);
  }
  const sc = tableWrap.querySelector(".tbody-wrap");
  let nearEdge = false;
  if (sc){
    const r = sc.getBoundingClientRect();
    if (d.y > r.bottom - 44){ nearEdge = true; if (sc.scrollTop < sc.scrollHeight - sc.clientHeight) sc.scrollTop += 7; }
    else if (d.y < r.top + 44){ nearEdge = true; if (sc.scrollTop > 0) sc.scrollTop -= 7; }
  }
  const el = document.elementFromPoint ? document.elementFromPoint(d.x, d.y) : null;
  const tr = el && el.closest ? el.closest("tr[data-id]") : null;
  if (tr){ const i = d.rows.indexOf(tr); if (i >= 0) d.cur = i; }
  const lo = Math.min(d.anchor, d.cur), hi = Math.max(d.anchor, d.cur);
  for (let i = 0; i < d.rows.length; i++){
    const row = d.rows[i], id = row.dataset.id, inR = (i >= lo && i <= hi);
    if (inR){ if (!selected.has(id)){ _tselRowSet(row, true); d.added.add(id); } }
    else if (d.added.has(id)){ _tselRowSet(row, false); d.added.delete(id); }
  }
  if (nearEdge) d.raf = requestAnimationFrame(_tselDragPaint);   // 靠邊時持續捲動+重算範圍
}
function _tselDragMove(e){
  if (!tselDrag) return;
  tselDrag.x = e.clientX; tselDrag.y = e.clientY;
  if (tselDrag.raf == null) tselDrag.raf = requestAnimationFrame(_tselDragPaint);
}
function _tselDragEnd(){
  if (!tselDrag) return;
  if (tselDrag.raf != null) cancelAnimationFrame(tselDrag.raf);
  tselDrag = null;
  document.body.classList.remove("dragsel");
}
document.addEventListener("pointermove", _tselDragMove);
document.addEventListener("pointerup", _tselDragEnd);
document.addEventListener("pointercancel", _tselDragEnd);

// ---- 客戶需求:拖曳選字、放開自動複製(正常模式) ----
(function(){
  let dsOn = false, dsAnchor = null, dsEl = null;
  function caretAt(x,y){
    if (document.caretRangeFromPoint) return document.caretRangeFromPoint(x,y);
    if (document.caretPositionFromPoint){ const p=document.caretPositionFromPoint(x,y); if(p){ const r=document.createRange(); r.setStart(p.offsetNode,p.offset); r.collapse(true); return r; } }
    return null;
  }
  function dsCopy(t){ if(!t) return; if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(t).catch(()=>legacyCopy(t)); else legacyCopy(t); }
  cardsEl.addEventListener("pointerdown", e => {
    if (editMode || selectMode) return;
    if (e.target.closest(".need-link")) return;   // 連結點擊直接開網址,不啟動拖曳選字
    const nd = e.target.closest(".ov-need-in"); if (!nd) return;
    const r = caretAt(e.clientX, e.clientY); if (!r) return;
    e.stopPropagation(); e.preventDefault();
    dsOn = true; dsAnchor = r; dsEl = nd;
    try { window.getSelection().removeAllRanges(); } catch(_){}
    try { nd.setPointerCapture(e.pointerId); } catch(_){}
  }, true);
  cardsEl.addEventListener("pointermove", e => {
    if (!dsOn) return;
    e.preventDefault(); e.stopPropagation();
    const r = caretAt(e.clientX, e.clientY); if (!r) return;
    if (dsEl && !dsEl.contains(r.startContainer)) return;
    const ssel = window.getSelection(); ssel.removeAllRanges();
    const rng = document.createRange();
    try {
      if (dsAnchor.compareBoundaryPoints(Range.START_TO_START, r) <= 0){ rng.setStart(dsAnchor.startContainer, dsAnchor.startOffset); rng.setEnd(r.startContainer, r.startOffset); }
      else { rng.setStart(r.startContainer, r.startOffset); rng.setEnd(dsAnchor.startContainer, dsAnchor.startOffset); }
      ssel.addRange(rng);
    } catch(_){}
  }, true);
  function dsEnd(){
    if (!dsOn) return; dsOn = false;
    const t = window.getSelection().toString().replace(/\s+/g," ").trim();
    if (t){ dsCopy(t); toast("已複製：" + t); }
    setTimeout(() => { try { window.getSelection().removeAllRanges(); } catch(_){} }, 500);
  }
  cardsEl.addEventListener("pointerup", dsEnd, true);
  cardsEl.addEventListener("pointercancel", dsEnd, true);
})();
cardsEl.addEventListener("click", e => {
  if (suppressClick){ suppressClick = false; return; }
  if (longPressed){ longPressed = false; e.preventDefault(); e.stopPropagation(); return; }
  const card = e.target.closest("[data-id]");
  if (!card) return;

  if (editMode){
    openForm(id);                 // 編輯模式:點一下進編輯表單(長按才進刪除多選)
  } else {

});

// ---- 底部「已選 N 筆/刪除」工具列:跟著「視覺視窗」走 ----
// 手機雙指放大後,position:fixed 貼的是「版面視窗」而不是你看到的那塊,工具列會被推到畫面外,
// 看起來就變成「卡片選起來了、卻沒有刪除列」。這裡用 visualViewport 把它拉回可視範圍底部,
// 並抵銷縮放倍率讓它維持原本大小。未縮放時完全不干預(維持原定位)。
(function(){
  const vv = window.visualViewport;
  if (!vv || !selbar) return;
  let raf = null;
  function apply(){
    raf = null;
    const s = vv.scale || 1;
    if (Math.abs(s - 1) < 0.01){   // 沒放大:不做任何校正
      selbar.style.setProperty("--vvx", "0px");
      selbar.style.setProperty("--vvy", "0px");
      selbar.style.setProperty("--vvs", "1");
      return;
    }
    const dx = vv.offsetLeft + vv.width / 2 - window.innerWidth / 2;              // 對齊可視範圍的水平中心
    const dy = (vv.offsetTop + vv.height - 18 / s) - (window.innerHeight - 18);   // 貼齊可視範圍底部(留同樣的 18px 視覺間距)
    selbar.style.setProperty("--vvx", dx + "px");
    selbar.style.setProperty("--vvy", dy + "px");
    selbar.style.setProperty("--vvs", String(1 / s));
  }
  const sched = () => { if (raf == null) raf = requestAnimationFrame(apply); };
  vv.addEventListener("resize", sched);
  vv.addEventListener("scroll", sched);
  apply();
})();

// ---- Backup / Import / Cloud / Reset ----
// 設定統一打包/套用(參考物件總覽 schema v5):collectSettings 收集全部偏好;applySettings 型別檢查後逐項套用。
// 注意:applySettings 只做「純本機儲存+畫面套用」,不呼叫 onLocalChange——由呼叫端決定要不要觸發同步,避免回授迴圈。
function collectSettings(){
  return { density: density, sort: currentSort, colw: colW, theme: theme, opts: customOpts, fltorder: filterOrder, expfocus: expFocus, optorder: optOrder };
}
function applySettings(s){
  if (!s || typeof s !== "object") return;
  if (s.density === "compact" || s.density === "normal"){ setDensity(s.density); }
  if (typeof s.sort === "string" && SORTS.some(x => x.key === s.sort)){
    currentSort = s.sort; saveSort();
    if (typeof sortTxt !== "undefined" && sortTxt) sortTxt.textContent = (SORTS.find(x => x.key === currentSort) || SORTS[0]).label;
  }
  if (s.colw && typeof s.colw === "object"){ colW = {...DEFAULT_COLW, ...s.colw}; saveColW(); }
  if (s.theme === "dark" || s.theme === "light"){ theme = s.theme; saveTheme(); applyTheme(); }
  if (s.opts && typeof s.opts === "object"){ customOpts = normOpts(s.opts); try { localStorage.setItem("customer_app_opts_v1", JSON.stringify(customOpts)); } catch(e){} }
  if (s.fltorder && typeof s.fltorder === "object"){ filterOrder = s.fltorder; saveFltOrder(); }
  if (typeof s.expfocus === "boolean"){ expFocus = s.expfocus; saveExpFocus(); applyExpFocus(); }
  if (s.optorder && typeof s.optorder === "object"){ optOrder = s.optorder; saveOptOrder(); }
}
function backupData(){
  // v5:設定統一放進 settings;頂層 colw/theme/opts 保留一份,讓「舊版 App」也能匯入這個新備份檔(向下相容)
  return { version: 5, exportedAt: new Date().toISOString(), deviceId, cats, items, deleted, settings: collectSettings(), colw: colW, theme: theme, opts: customOpts };
}
function backupFileName(){
  const d = new Date(), p = n => String(n).padStart(2,"0");
  return "客戶總覽備份_" + d.getFullYear() + "-" + p(d.getMonth()+1) + "-" + p(d.getDate())
    + "-" + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds()) + ".json";
}
function downloadBackup(){
  const blob = new Blob([JSON.stringify(backupData(), null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = backupFileName(); a.click();
  URL.revokeObjectURL(url);
}
document.getElementById("exportBtn").addEventListener("click", () => { downloadBackup(); toast("已下載備份檔"); });
// 「備份到 Google 雲端」的實作在下方 Google 雲端同步 IIFE 內(用獨立的 drive.file 授權,不影響同步)
const importFile = document.getElementById("importFile");
function applyBackup(parsed){
  let newItems, newCats = null, newDeleted = null;
  if (Array.isArray(parsed)) { newItems = parsed; }
  else if (parsed && Array.isArray(parsed.items)) {
    newItems = parsed.items;
    if (Array.isArray(parsed.cats) && parsed.cats.length) newCats = parsed.cats;
    if (parsed.deleted && typeof parsed.deleted === "object") newDeleted = parsed.deleted;
  }
  else throw new Error("bad format");
  items = newItems.map(d => ({...d, id: d.id || uid(), updatedAt: Date.now()}));
  if (newCats) { cats = newCats; saveCats(); touchCats(); renderTabs(); renderCatOptions(); }
  if (newDeleted) { deleted = newDeleted; saveDeleted(); }
  if (parsed && parsed.settings && typeof parsed.settings === "object"){
    applySettings(parsed.settings);                 // v5:設定統一套用
    onLocalChange("settings");                      // 更新設定時間戳並排程同步,匯入的設定才會推上雲端
  } else if (parsed && (parsed.colw || parsed.theme || parsed.opts)){
    applySettings({ colw: parsed.colw, theme: parsed.theme, opts: parsed.opts });   // v4 舊備份:頂層欄位相容
    onLocalChange("settings");
  }
  saveItems(); renderCover();
  if (typeof applyFilter === "function") applyFilter();
  onLocalChange("data");
  toast(`已匯入 ${items.length} 筆需求`);
}
// 「匯入備份檔」的來源選擇(手機 / Google 雲端)綁定在下方 Google 雲端 IIFE 內
importFile.addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try { applyBackup(JSON.parse(reader.result)); }
    catch (err) { toast("匯入失敗：格式不正確"); }
    importFile.value = "";
  };
  reader.readAsText(file);
});
document.getElementById("importBtn").addEventListener("click", () => importFile.click());
document.getElementById("resetBtn").addEventListener("click", () => {
  askConfirm("還原預設資料？", "目前所有的新增與修改都會被覆蓋。", () => {
    items = SEED.map((d,i) => ({...d, id: "seed"+i, updatedAt: Date.now()}));
    deleted = {}; saveDeleted();

// ---- 自訂調色盤(HSV):取代原生 input[type=color] ----
function hsvToRgb(h, s2, v){ h = ((h % 360) + 360) % 360;
  const c = v * s2, x = c * (1 - Math.abs(((h / 60) % 2) - 1)), m = v - c;
  let r = 0, g = 0, b = 0;
  if (h < 60){ r = c; g = x; } else if (h < 120){ r = x; g = c; } else if (h < 180){ g = c; b = x; }
  else if (h < 240){ g = x; b = c; } else if (h < 300){ r = x; b = c; } else { r = c; b = x; }
  return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
}
function rgbToHex(r, g, b){ return "#" + [r, g, b].map(n => Math.max(0, Math.min(255, n)).toString(16).padStart(2, "0")).join(""); }
function hexToRgb(hex){ const m = /^#?([0-9a-fA-F]{6})$/.exec(String(hex || "").trim()); if (!m) return null;
  const n = parseInt(m[1], 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; }
function rgbToHsv(r, g, b){ r /= 255; g /= 255; b /= 255;
  const mx = Math.max(r, g, b), mn = Math.min(r, g, b), d = mx - mn;
  let h = 0;
  if (d){ if (mx === r) h = 60 * (((g - b) / d) % 6); else if (mx === g) h = 60 * ((b - r) / d + 2); else h = 60 * ((r - g) / d + 4); }
  return [((h % 360) + 360) % 360, mx ? d / mx : 0, mx];
}

let catDrag = null;
catListEl.addEventListener("pointerdown", e => {
  const handle = e.target.closest(".cat-drag");
  if (!handle) return;
  const row = handle.closest(".cat-item");
  if (!row) return;
  e.preventDefault();
  const rows = Array.from(catListEl.children);
  const index = rows.indexOf(row);
  const rowH = rows.length > 1
    ? (rows[1].getBoundingClientRect().top - rows[0].getBoundingClientRect().top)
    : row.offsetHeight + 9;
  catDrag = { row, index, target: index, startY: e.clientY, rowH, rows };
  row.classList.add("dragging");
  document.body.style.userSelect = "none";
});
document.addEventListener("pointermove", e => {
  if (!catDrag) return;
  const dy = e.clientY - catDrag.startY;
  catDrag.row.style.transform = `translateY(${dy}px)`;
  let target = catDrag.index + Math.round(dy / catDrag.rowH);
  target = Math.max(0, Math.min(catDrag.rows.length - 1, target));
  if (target !== catDrag.target){
    catDrag.target = target;
    const from = catDrag.index;
    catDrag.rows.forEach((r, j) => {
      if (r === catDrag.row) return;
      let shift = 0;
      if (from < target && j > from && j <= target) shift = -catDrag.rowH;
      else if (from > target && j >= target && j < from) shift = catDrag.rowH;
      r.style.transform = shift ? `translateY(${shift}px)` : "";
    });
  }
});
function endCatDrag(){
  if (!catDrag) return;
  const from = catDrag.index, to = catDrag.target, rows = catDrag.rows, row = catDrag.row;
  rows.forEach(r => { r.style.transform = ""; r.classList.remove("dragging"); });
  row.style.transform = "";
  document.body.style.userSelect = "";
  catDrag = null;
  if (from !== to){
    const moved = cats.splice(from, 1)[0];
    cats.splice(to, 0, moved);
    refreshCategories();
    renderCatList();
    toast("已調整順序");
  }
}

/* =========================================================================
   滑動返回:在列表頁/設定頁，水平滑動(左或右)即返回上一頁(回到封面)。
   忽略:類別橫向捲動列、輸入框、下拉選單、以及任何彈窗開啟時。
   ========================================================================= */
(function(){
  const H_MIN = 70;     // 觸發返回所需的最小水平距離(px)
  const RATIO = 1.5;    // 水平位移須明顯大於垂直(避免和上下捲動衝突)
  const T_MAX = 800;    // 手勢最長時間(ms)
  let sx = 0, sy = 0, st = 0, track = false, skip = false;

  function overlayOpen(){
    return modalBg.classList.contains("open")
        || catBg.classList.contains("open")
        || confirmBg.classList.contains("open")
        || sortSel.classList.contains("open");
  }
  function currentView(){
    if (settingsView.classList.contains("active")) return "settings";
    if (listView.classList.contains("active")) return "list";
    return "cover";
  }
  function goBack(){
    const v = currentView();
    if (v === "settings") closeSettings();
    else if (v === "list") showCover();
  }
  // 「彈出式浮層」(下拉/類別選單/欄篩選/連結面板/調色盤/日曆)開著時:
  // 橫滑 = 關閉浮層,不做返回導航 —— 下拉還開著就跳回首頁很反直覺。
  function swipeClosePopups(){
    let closed = false;
    const show = id => { const el = document.getElementById(id); return !!(el && el.classList.contains("show")); };
    if (show("toptmenu") || show("catmenu") || document.querySelector(".colflt.show, #colflt.show")){
      if (typeof closeOtherOverlays === "function") closeOtherOverlays("exp");   // 展開列保留,只關彈出物
      closed = true;
    }
    if (show("linkpop")){ if (typeof commitLink === "function") commitLink(); closed = true; }   // 連結面板:滑動視同「完成」
    if (show("cpick")){ if (typeof cpClose === "function") cpClose(true); closed = true; }       // 調色盤:套用並關閉
    const cal = document.getElementById("calBg");
    if (cal && cal.classList.contains("open")){ cal.classList.remove("open"); closed = true; }
    return closed;
  }

  document.addEventListener("touchstart", function(e){
    if (e.touches.length !== 1){ track = false; return; }
    const t = e.touches[0];
    sx = t.clientX; sy = t.clientY; st = Date.now(); track = true;
    const el = e.target;
    // 起點若在橫向捲動列 / 輸入框 / 下拉選單 / 表格 / 連結視窗上，則不攔截(讓它們正常運作)
    skip = !!(el.closest && el.closest("#tabs, input, textarea, .cselect, .table-wrap, #linkpop, #catmenu, select"));
    if (modalBg.classList.contains("open")) skip = false;  // 編輯表單開啟時,允許滑動關閉
  }, { passive: true });

  document.addEventListener("touchend", function(e){
    if (!track){ return; }
    track = false;
    if (skip) return;
    if (e.changedTouches.length !== 1) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - sx, dy = t.clientY - sy, dt = Date.now() - st;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    if (ax >= H_MIN && ax > ay * RATIO && dt <= T_MAX){
      // 編輯客戶表單開啟時,橫向滑動 = 關閉表單(返回)
      if (modalBg.classList.contains("open")){
        e.preventDefault();
        suppressClick = true;
        setTimeout(function(){ suppressClick = false; }, 500);
        closeForm();
        return;
      }
      if (swipeClosePopups()){            // 浮層開著:這一滑只負責關閉浮層
        e.preventDefault();
        suppressClick = true;
        setTimeout(function(){ suppressClick = false; }, 500);
        return;
      }
      if (overlayOpen()) return;          // 對話框類(表單/管理類別/確認/排序)維持原行為
      if (currentView() === "cover") return;
      e.preventDefault();                 // 吞掉手勢後的殘留 click
      suppressClick = true;
      setTimeout(function(){ suppressClick = false; }, 500);
      goBack();
    }
  }, { passive: false });
})();

  function buildLocal(){

  function mergeMain(local, remote){
    if (!remote || !remote.data) return local;
    const out = { rev: 0, lastWriteBy: deviceId, updatedAt: Date.now(), data: {}, cats: null, settings: null, deleted: {} };
    // tombstones: union, later deletion time wins
    const del = {}; const ld = local.deleted || {}, rd = remote.deleted || {};
    for (const k in ld) del[k] = ld[k];
    for (const k in rd) del[k] = Math.max(del[k] || 0, rd[k]);
    // properties: union by id, newer updatedAt wins, then drop if tombstoned after last update
    // 平手(同 updatedAt 但內容不同)改用「確定性裁決」:兩端都選序列化字串較大的那筆,必然收斂。
    // 舊寫法平手時偏向本機(先看到的贏),兩台各自堅持自己 → 每輪輪詢互相推翻的無限推送戰爭。
    const recKey = function(r){ return JSON.stringify(sortKeys(r)); };
    const byId = {}; const lp = (local.data && local.data.properties) || [], rp = (remote.data && remote.data.properties) || [];
    lp.concat(rp).forEach(function(r){
      if (!r || r.id == null) return;
      const cur = byId[r.id];
      if (!cur){ byId[r.id] = r; return; }
      const a = (r.updatedAt||0), b = (cur.updatedAt||0);
      if (a > b){ byId[r.id] = r; return; }
      if (a === b && recKey(r) > recKey(cur)) byId[r.id] = r;
    });

    for (const id in byId){ const r = byId[id]; const dt = del[id]; if (dt && dt >= (r.updatedAt||0)) continue; props.push(r); }

    const pickLWW = function(l, r){

      return JSON.stringify(sortKeys(l)) >= JSON.stringify(sortKeys(r)) ? l : r;

  function disconnect(){
    askConfirm("解除 Google 連結？", "只會停止這台裝置的同步，雲端資料不會被刪除。", function(){
      if (accessToken && window.google && google.accounts && google.accounts.oauth2){ try { google.accounts.oauth2.revoke(accessToken, function(){}); } catch(e){} }
      syncConnected = false; syncEmail = null; accessToken = null; tokenExpiry = 0; fileId = null; lastVersion = null; needReauth = false;
      stopPolling(); saveAuth(); window.renderSyncCard(); refreshLed();
      toast("已解除連結");
    });
  }

  // ---- wire buttons + init ----
  document.getElementById("gConnect").addEventListener("click", connect);
  document.getElementById("gDisconnect").addEventListener("click", disconnect);
  document.getElementById("gSyncNow").addEventListener("click", function(){ if (needReauth) connect(); else syncNow(); });
  document.getElementById("cloudBtn").addEventListener("click", async function(){
    if (!gisReady()){ toast("Google 服務尚未載入,請稍候再試"); return; }
    try {
      let token;
      try { token = (fileToken && Date.now() < fileTokenExpiry) ? fileToken : await requestFileToken(false); }
      catch (e1){ token = await requestFileToken(true); }
      await loadPicker();
      const folder = await pickFolder(token);
      if (!folder) return;                         // 使用者取消選資料夾
      toast("備份中…");
      let r = await driveUploadVisible(token, folder.id);
      if (r.res.status === 401 || r.res.status === 403){ fileToken = null; token = await requestFileToken(true); r = await driveUploadVisible(token, folder.id); }
      if (!r.res.ok) throw new Error("upload " + r.res.status);
      toast("已備份到「" + folder.name + "」");
    } catch (e){
      const err = String((e && (e.error || e.type || e.message)) || "");
      if (err === "access_denied" || err.indexOf("popup") >= 0){ toast("已取消"); }
      else { toast("備份失敗,請重試,或改用「匯出備份檔」"); }
    }
  });
  document.getElementById("cloudImportBtn").addEventListener("click", driveImportBackup);
  document.addEventListener("visibilitychange", function(){
    if (!syncConnected || needReauth) return;
    if (!document.hidden){ syncNow(); }                            // 回前景:拉取最新
    else { clearTimeout(pushTimer); pushTimer = null; syncNow(); } // 切背景/關閉前:把還沒推的變更立刻送出
  });
  window.addEventListener("pagehide", function(){
    if (syncConnected && !needReauth){ clearTimeout(pushTimer); pushTimer = null; syncNow(); }
  });

  // 開檔先依「上次的連結狀態」渲染同步卡片(純讀本機 localStorage,不等 GIS client 從網路載入完成),
  // 避免視窗長時間背景後恢復/開啟時,「連結 Google 帳號」登入介面因枯等 GIS 載入而先露出、隨後才被隱藏(閃一下)。
  (function(){
    try { const a = loadAuth(); if (a && a.connected){ syncConnected = true; syncEmail = a.email || null; } } catch(e){}
    window.renderSyncCard();
  })();

  whenGis(function(){
    initClient();
    const auth = loadAuth();
    if (auth && auth.connected){
      syncConnected = true; syncEmail = auth.email || null;
      window.renderSyncCard();
      syncNow().then(function(){ if (!needReauth) startPolling(); });
    } else {
      window.renderSyncCard();
    }
    refreshLed();
  });
})();
</script>
</body>
</html>
